name: auth_phone
description: Basic phone authentication package.
publish_to: none
version: 0.1.0
resolution: workspace

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  design_system:
    path: ../design_system
  flutter_riverpod: ^2.6.1
  freezed_annotation: ^2.4.4
  phone_numbers_parser: ^9.0.21
  syncfusion_flutter_pdfviewer: ^32.2.9

dev_dependencies:
  build_runner: ^2.4.13
  freezed: ^2.5.7

flutter:
  plugin:
    platforms:
      android:
        package: ai.funfox.auth_phone
        pluginClass: AuthPhonePlugin
